name: WorldClockWallpaper
options:
  bundleIdPrefix: com.worldclockwallpaper
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  WorldClockWallpaper:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: WorldClockWallpaper
        excludes:
          - "**/*.md"
    resources:
      - path: WorldClockWallpaper/Resources
        optional: true
      - path: WorldClockWallpaper/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.worldclockwallpaper.WorldClockWallpaper
        SWIFT_VERSION: 5.9
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        INFOPLIST_FILE: WorldClockWallpaper/Info.plist
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_ENTITLEMENTS: WorldClockWallpaper/WorldClockWallpaper.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - sdk: WebKit.framework
      - sdk: Combine.framework
      - sdk: ServiceManagement.framework
      - sdk: CoreLocation.framework

  WorldClockWallpaperTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: WorldClockWallpaperTests
    settings:
      base:
        SWIFT_VERSION: 5.9
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/WorldClockWallpaper.app/Contents/MacOS/WorldClockWallpaper
        BUNDLE_LOADER: $(TEST_HOST)
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: WorldClockWallpaper
