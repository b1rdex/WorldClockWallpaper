<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: rgb(30, 30, 30); overflow: hidden; }
  svg { display: block; }

  .city-label {
    font-family: -apple-system, "SF Pro Display", sans-serif;
    fill: #e8e8e8;
    font-size: 12px;
    pointer-events: none;
  }
  .city-time {
    font-family: -apple-system, "SF Pro Display", sans-serif;
    fill: #f0c040;
    font-size: 13px;
    font-weight: 600;
    pointer-events: none;
  }
  .city-tz {
    font-family: -apple-system, "SF Pro Display", sans-serif;
    fill: #a0a0a0;
    font-size: 10px;
    pointer-events: none;
  }
  .city-dot { fill: #f0c040; }
</style>
</head>
<body>
<svg id="map"></svg>
<script src="d3.v7.min.js"></script>
<script src="topojson.v3.min.js"></script>
<script>
// ── State ────────────────────────────────────────────────────────────────────
let cities = [];
let worldData = null;

let width = window.innerWidth;
let height = window.innerHeight;

const svg = d3.select("#map")
  .attr("width", width)
  .attr("height", height);

// ── Projection ────────────────────────────────────────────────────────────────
// Scale to width: full 360° always visible, map height = screenWidth / 2.
function scaleForWidth(w) {
  // Equirectangular maps 360° → scale * 2π pixels wide.
  return w / (2 * Math.PI);
}

const projection = d3.geoEquirectangular()
  .scale(scaleForWidth(width))
  .translate([width / 2, height / 2])
  .clipExtent([[0, 0], [width, height]]);

const path = d3.geoPath().projection(projection);

// Layers (back → front)
const southFill   = svg.append("rect").attr("id", "south-fill").attr("fill", "rgb(86, 86, 86)");
const landLayer   = svg.append("g").attr("id", "land");
const borderLayer = svg.append("g").attr("id", "borders");
const nightLayer  = svg.append("g").attr("id", "night");
const cityLayer   = svg.append("g").attr("id", "cities");

// ── Antisolar point ───────────────────────────────────────────────────────────
// Returns [longitude, latitude] of the point directly opposite the sun.
// A geoCircle of radius 90° centered here equals exactly the night hemisphere.
function getAntisolarPoint(date) {
  const utHours = date.getUTCHours() + date.getUTCMinutes() / 60 + date.getUTCSeconds() / 3600;
  // Longitude of solar noon right now (subsolar meridian)
  const subsolarLon = (180 - (utHours - 12) * 15 + 360) % 360 - 180;
  // Solar declination via day-of-year approximation (±23.45°)
  const dayOfYear = Math.floor((date - new Date(Date.UTC(date.getUTCFullYear(), 0, 0))) / 86400000); // day 1 = Jan 1
  const declination = 23.45 * Math.sin((2 * Math.PI / 365) * (dayOfYear - 81));
  // Antisolar point is the antipode of the subsolar point
  const antiLon = ((subsolarLon + 180) + 540) % 360 - 180;
  const antiLat = -declination;
  return [antiLon, antiLat];
}

// ── Night overlay + terminator line ──────────────────────────────────────────
function drawNight(date) {
  nightLayer.selectAll("*").remove();
  const [lon, lat] = getAntisolarPoint(date);
  const nightGeo = d3.geoCircle().center([lon, lat]).radius(90)();

  // Night: dark semi-transparent gray overlay
  nightLayer.append("path")
    .datum(nightGeo)
    .attr("d", path)
    .attr("fill", "rgba(0, 0, 0, .6)");

  // Terminator: draw only the true arc as a LineString so D3 doesn't add
  // artificial closing edges along the clip rectangle when the polygon wraps.
  const terminatorLine = { type: "LineString", coordinates: nightGeo.coordinates[0] };
  nightLayer.append("path")
    .datum(terminatorLine)
    .attr("d", path)
    .attr("fill", "none")
    .attr("stroke", "rgba(255, 255, 255, 0.85)")
    .attr("stroke-width", 1.5);

  // South fill night overlay: if the south pole is in the night hemisphere,
  // cover the strip below the map projection with the same dark overlay.
  const southPt = projection([0, -90]);
  if (southPt && southPt[1] < height) {
    const southInNight = d3.geoDistance([0, -90], [lon, lat]) < Math.PI / 2;
    if (southInNight) {
      nightLayer.append("rect")
        .attr("x", 0).attr("y", southPt[1])
        .attr("width", width).attr("height", height - southPt[1])
        .attr("fill", "rgba(0, 0, 0, .6)");
    }
  }
}

// ── Land + borders ────────────────────────────────────────────────────────────
function drawLand() {
  landLayer.selectAll("*").remove();
  borderLayer.selectAll("*").remove();
  const countries = topojson.feature(worldData, worldData.objects.countries);
  const borders   = topojson.mesh(worldData, worldData.objects.countries,
                                  (a, b) => a !== b);
  landLayer.selectAll("path.country")
    .data(countries.features)
    .enter().append("path")
      .attr("class", "country")
      .attr("d", path)
      .attr("fill", "rgb(86, 86, 86)")
      .attr("stroke", "none");

  // borderLayer.append("path")
  //   .datum(borders)
  //   .attr("d", path)
  //   .attr("fill", "none")
  //   .attr("stroke", "#444")
  //   .attr("stroke-width", 0.4);
}

// ── City pins ─────────────────────────────────────────────────────────────────
function drawCities() {
  cityLayer.selectAll("*").remove();
  cities.forEach(city => {
    const projected = projection([city.lon, city.lat]);
    if (!projected) return;
    const [x, y] = projected;

    const g = cityLayer.append("g").attr("transform", `translate(${x},${y})`);
    g.append("circle").attr("class", "city-dot").attr("r", 4);
    g.append("text").attr("class", "city-label")
      .attr("dx", 8).attr("dy", -5)
      .text(city.name ?? "");
    g.append("text").attr("class", "city-time")
      .attr("dx", 8).attr("dy", 10)
      .attr("data-tz", city.timezone)
      .text(localTime(city.timezone));
    g.append("text").attr("class", "city-tz")
      .attr("dx", 8).attr("dy", 23)
      .attr("data-tz-offset", city.timezone)
      .text(utcOffset(city.timezone));
  });
}

function updateTimes() {
  cityLayer.selectAll("text[data-tz]").each(function() {
    d3.select(this).text(localTime(this.dataset.tz));
  });
  cityLayer.selectAll("text[data-tz-offset]").each(function() {
    d3.select(this).text(utcOffset(this.dataset.tzOffset));
  });
}

function localTime(timezone) {
  try {
    return new Date().toLocaleTimeString("en-GB", {
      timeZone: timezone, hour: "2-digit", minute: "2-digit"
    });
  } catch { return "--:--"; }
}

function utcOffset(timezone) {
  try {
    const parts = new Intl.DateTimeFormat("en", {
      timeZone: timezone, timeZoneName: "shortOffset"
    }).formatToParts(new Date());
    const tz = parts.find(p => p.type === "timeZoneName")?.value ?? "";
    return tz.replace("GMT", "UTC");
  } catch { return ""; }
}

// ── Full redraw ───────────────────────────────────────────────────────────────
function updateSouthFill() {
  const southY = (projection([0, -90]) ?? [0, height])[1];
  southFill.attr("x", 0).attr("y", southY).attr("width", width).attr("height", height - southY);
}

function draw() {
  if (!worldData) return;
  updateSouthFill();
  drawLand();
  drawCities();
  drawNight(new Date());
}

// ── Init (called by Swift after page load) ────────────────────────────────────
window.initMap = function(data) {
  worldData = data;
  draw();
  setInterval(() => drawNight(new Date()), 60000); // update night zone every 1 min
  setInterval(updateTimes, 1000);                  // update clock digits every 1 sec
};

// ── Resize ────────────────────────────────────────────────────────────────────
let resizeTimer;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    width = window.innerWidth; height = window.innerHeight;
    svg.attr("width", width).attr("height", height);
    projection
      .scale(scaleForWidth(width))
      .translate([width / 2, height / 2])
      .clipExtent([[0, 0], [width, height]]);
    draw();
  }, 100);
});

// ── Swift ↔ JS bridge ─────────────────────────────────────────────────────────
window.updateCities = function(newCities) {
  cities = newCities;
  drawCities();
};

window.webkit?.messageHandlers?.cityBridge?.postMessage("requestCities");

// ── Browser dev mode ──────────────────────────────────────────────────────────
// Auto-bootstraps when opened via HTTP server (not inside Swift/WebKit).
// Run: make dev — then open http://localhost:8090/map.html
if (!window.webkit?.messageHandlers?.cityBridge) {
  fetch('world-50m.json')
    .then(r => r.json())
    .then(data => {
      window.initMap(data);
      window.updateCities([
        { name: "Anchorage",    lat:  61.22, lon: -149.90, timezone: "America/Anchorage"      },
        { name: "Los Angeles",  lat:  34.05, lon: -118.24, timezone: "America/Los_Angeles"    },
        { name: "New York",     lat:  40.71, lon:  -74.01, timezone: "America/New_York"       },
        { name: "Bogotá",       lat:   4.71, lon:  -74.07, timezone: "America/Bogota"         },
        { name: "São Paulo",    lat: -23.55, lon:  -46.63, timezone: "America/Sao_Paulo"      },
        { name: "Buenos Aires", lat: -34.60, lon:  -58.38, timezone: "America/Argentina/Buenos_Aires" },
        { name: "Berlin",       lat:  52.52, lon:   13.40, timezone: "Europe/Berlin"          },
        { name: "Tel Aviv",     lat:  32.08, lon:   34.78, timezone: "Asia/Jerusalem"         },
        { name: "Moscow",       lat:  55.75, lon:   37.62, timezone: "Europe/Moscow"          },
        { name: "Novosibirsk",  lat:  54.99, lon:   82.90, timezone: "Asia/Novosibirsk"       },
        { name: "Nairobi",      lat:  -1.29, lon:   36.82, timezone: "Africa/Nairobi"         },
        { name: "Lagos",        lat:   6.52, lon:    3.38, timezone: "Africa/Lagos"           },
        { name: "Bangkok",      lat:  13.75, lon:  100.52, timezone: "Asia/Bangkok"           },
        { name: "Ulaanbaatar",  lat:  47.91, lon:  106.88, timezone: "Asia/Ulaanbaatar"       },
        { name: "Vladivostok",  lat:  43.12, lon:  131.89, timezone: "Asia/Vladivostok"       },
        { name: "Beijing",      lat:  39.91, lon:  116.39, timezone: "Asia/Shanghai"          },
        { name: "Tokyo",        lat:  35.69, lon:  139.69, timezone: "Asia/Tokyo"             },
        { name: "Petropavlovsk", lat:  53.01, lon:  158.65, timezone: "Asia/Kamchatka"         },
        { name: "Sydney",       lat: -33.87, lon:  151.21, timezone: "Australia/Sydney"       },
      ]);
    });
}
</script>
</body>
</html>
